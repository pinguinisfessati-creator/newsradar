<html lang="it">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📰 NewsRadar — Rassegna Settimanale</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #22263a;
    --accent: #4f6ef7;
    --accent2: #7c3aed;
    --text: #e8eaf6;
    --muted: #8892b0;
    --green: #22c55e;
    --orange: #f59e0b;
    --red: #ef4444;
    --border: #2d3250;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1a1d27 0%, #22263a 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(90deg, #4f6ef7, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .week-badge { background: var(--card2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 16px; font-size: 0.85rem; color: var(--muted); }

  .filters { display: flex; gap: 10px; padding: 24px 40px 10px; flex-wrap: wrap; align-items: center; }
  .filter-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  .filter-btn:hover, .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .search-box { margin-left: auto; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; width: 220px; }
  .search-box:focus { outline: none; border-color: var(--accent); }

  .main { padding: 20px 40px; display: grid; grid-template-columns: 1fr 360px; gap: 28px; }

  .news-grid { display: flex; flex-direction: column; gap: 16px; }

  .news-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 22px;
    display: flex; gap: 16px;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .news-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px; }
  .news-card.green::before { background: var(--green); }
  .news-card.orange::before { background: var(--orange); }
  .news-card.red::before { background: var(--red); }
  .news-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(79,110,247,0.15); border-color: var(--accent); }
  .news-card.hidden { display: none; }

  .score-badge {
    min-width: 52px; height: 52px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 900; flex-shrink: 0;
  }
  .score-badge.green { background: rgba(34,197,94,0.15); color: var(--green); border: 1.5px solid rgba(34,197,94,0.3); }
  .score-badge.orange { background: rgba(245,158,11,0.15); color: var(--orange); border: 1.5px solid rgba(245,158,11,0.3); }
  .score-badge.red { background: rgba(239,68,68,0.15); color: var(--red); border: 1.5px solid rgba(239,68,68,0.3); }

  .news-body { flex: 1; }
  .news-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
  .tag { font-size: 0.72rem; font-weight: 700; padding: 2px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.05em; }
  .tag.politica { background: rgba(79,110,247,0.2); color: #7c9ff7; }
  .tag.economia { background: rgba(34,197,94,0.2); color: #4ade80; }
  .tag.esteri { background: rgba(245,158,11,0.2); color: #fbbf24; }
  .tag.cronaca { background: rgba(239,68,68,0.2); color: #f87171; }
  .tag.tecnologia { background: rgba(124,58,237,0.2); color: #a78bfa; }
  .tag.societa { background: rgba(20,184,166,0.2); color: #2dd4bf; }
  .tag.ambiente { background: rgba(101,163,13,0.2); color: #a3e635; }
  .tag.sport { background: rgba(249,115,22,0.2); color: #fb923c; }
  .tag.campania { background: rgba(255,200,0,0.2); color: #fcd34d; }
  .source-chip { font-size: 0.72rem; color: var(--muted); }

  .news-title { font-size: 1rem; font-weight: 700; line-height: 1.4; margin-bottom: 6px; }
  .news-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }
  .news-footer { display: flex; gap: 12px; margin-top: 10px; align-items: center; }
  .social-buzz { font-size: 0.78rem; color: var(--muted); display: flex; align-items: center; gap: 4px; }
  .trending { color: var(--orange); font-size: 0.75rem; font-weight: 700; }

  /* Sidebar */
  .sidebar { display: flex; flex-direction: column; gap: 20px; }

  .ai-panel {
    background: linear-gradient(135deg, #1e1b4b 0%, #1a1d27 100%);
    border: 1px solid #4f6ef7;
    border-radius: 16px;
    padding: 22px;
    position: sticky; top: 90px;
  }
  .ai-title { font-size: 1rem; font-weight: 800; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .ai-subtitle { font-size: 0.78rem; color: var(--muted); margin-bottom: 16px; }
  .ai-rec { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s; }
  .ai-rec:hover { border-color: var(--accent); }
  .ai-rec-num { font-size: 0.7rem; color: var(--accent); font-weight: 800; margin-bottom: 4px; }
  .ai-rec-title { font-size: 0.85rem; font-weight: 700; line-height: 1.4; margin-bottom: 4px; }
  .ai-rec-reason { font-size: 0.75rem; color: var(--muted); line-height: 1.4; }
  .ai-badge { background: linear-gradient(90deg, #4f6ef7, #7c3aed); font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; color: white; }

  .stats-panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
  .stats-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { font-size: 0.82rem; }
  .stat-bar-wrap { flex: 1; margin: 0 12px; height: 6px; background: var(--border); border-radius: 3px; }
  .stat-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .stat-count { font-size: 0.82rem; font-weight: 700; color: var(--accent); min-width: 20px; text-align: right; }

  .update-btn { width: 100%; background: linear-gradient(90deg, #4f6ef7, #7c3aed); border: none; color: white; padding: 12px; border-radius: 10px; font-size: 0.9rem; font-weight: 700; cursor: pointer; margin-top: 4px; transition: opacity 0.2s; }
  .update-btn:hover { opacity: 0.85; }

  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .section-title { font-size: 1.2rem; font-weight: 800; }
  .news-count { font-size: 0.82rem; color: var(--muted); }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    header { padding: 16px 20px; }
    .filters { padding: 16px 20px 8px; }
    .main { padding: 16px 20px; }
    .ai-panel { position: static; }
  }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; max-width: 600px; width: 90%; padding: 28px; max-height: 80vh; overflow-y: auto; }
  .modal-close { float: right; background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; }
  .modal-tag { margin-bottom: 12px; }
  .modal-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 10px; line-height: 1.4; }
  .modal-body { font-size: 0.9rem; color: var(--muted); line-height: 1.7; margin-bottom: 16px; }
  .modal-source-link { color: var(--accent); font-size: 0.85rem; text-decoration: none; }
  .modal-source-link:hover { text-decoration: underline; }
  .modal-score-row { display: flex; align-items: center; gap: 12px; margin-top: 14px; }
  .modal-score-label { font-size: 0.82rem; color: var(--muted); }
</style>
</head>

  <input class="search-box" type="text" placeholder="🔍  Cerca notizia..." oninput="searchNews(this.value)" />
</div>

<div class="main">
  <div class="news-grid" id="newsGrid">
    <div class="section-header">
      <div class="section-title">Notizie della Settimana</div>
      <div class="news-count" id="newsCount">20 notizie</div>

  <div class="sidebar">
    <div class="ai-panel">

    <div class="stats-panel">
      <div class="stats-title">📊 Per Tematica</div>
      <div id="statsPanel"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

function getScoreClass(score) {
  if (score >= 7) return 'green';
  if (score >= 5) return 'orange';
  return 'red';
}

function renderNews(items) {
  const grid = document.getElementById('newsGrid');
  const existing = grid.querySelectorAll('.news-card');
  existing.forEach(e => e.remove());

  document.getElementById('newsCount').textContent = items.length + ' notizie';

  items.forEach(n => {
    const cls = getScoreClass(n.score);
    const card = document.createElement('div');
    card.className = `news-card ${cls}`;
    card.dataset.cat = n.cat;
    card.dataset.id = n.id;
    card.innerHTML = `
      <div class="score-badge ${cls}">${n.score}</div>
      <div class="news-body">
        <div class="news-meta">
          <span class="tag ${n.cat}">${n.cat.charAt(0).toUpperCase()+n.cat.slice(1)}</span>
          <span class="source-chip">📰 ${n.source}</span>
          ${n.trending ? '<span class="trending">🔥 TRENDING</span>' : ''}
        </div>
        <div class="news-title">${n.title}</div>
        <div class="news-desc">${n.desc}</div>
        <div class="news-footer">
          <span class="social-buzz">${n.buzz}</span>
          <span style="font-size:0.75rem;color:var(--muted);margin-left:auto;">📅 ${n.date}</span>
        </div>
        <div style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap;">
          ${n.socials.map(s => `<span style="font-size:0.68rem;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:2px 8px;color:var(--muted)">${s}</span>`).join('')}
        </div>
      </div>`;
    card.addEventListener('click', () => openModal(n));
    grid.appendChild(card);
  });
}

function renderAI() {
  const container = document.getElementById('aiRecs');
  container.innerHTML = '';
  aiRecommendations.forEach(rec => {
    const div = document.createElement('div');
    div.className = 'ai-rec';
    div.innerHTML = `
      <div class="ai-rec-num">📺 CONSIGLIO #${rec.num}</div>
      <div class="ai-rec-title">${rec.title}</div>
      <div class="ai-rec-reason">${rec.reason}</div>`;
    div.addEventListener('click', () => {
      const n = news.find(x => x.id === rec.newsId);
      if (n) openModal(n);
    });
    container.appendChild(div);
  });
}

function renderStats() {
  const cats = {};
  news.forEach(n => { cats[n.cat] = (cats[n.cat] || 0) + 1; });
  const max = Math.max(...Object.values(cats));
  const panel = document.getElementById('statsPanel');
  panel.innerHTML = '';
  const icons = {politica:'🏛️',economia:'💶',esteri:'🌍',cronaca:'🚨',tecnologia:'💻',societa:'👥',ambiente:'🌿',sport:'⚽',campania:'🌋'};
  Object.entries(cats).sort((a,b)=>b[1]-a[1]).forEach(([cat, count]) => {
    const pct = Math.round((count/max)*100);
    panel.innerHTML += `<div class="stat-row">
      <div class="stat-label">${icons[cat]||''} ${cat.charAt(0).toUpperCase()+cat.slice(1)}</div>
      <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%"></div></div>
      <div class="stat-count">${count}</div>
    </div>`;
  });
}

function filterNews(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = cat === 'all' ? news : news.filter(n => n.cat === cat);
  renderNews(filtered);
}

function searchNews(query) {
  const q = query.toLowerCase().trim();
  const filtered = q === '' ? news : news.filter(n =>
    n.title.toLowerCase().includes(q) ||
    n.desc.toLowerCase().includes(q) ||
    n.cat.includes(q) ||
    n.source.toLowerCase().includes(q)
  );
  renderNews(filtered);
}

function openModal(n) {
  const cls = getScoreClass(n.score);
  const scoreColors = {green: '#22c55e', orange: '#f59e0b', red: '#ef4444'};
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-tag"><span class="tag ${n.cat}">${n.cat.charAt(0).toUpperCase()+n.cat.slice(1)}</span></div>
    <div class="modal-title">${n.title}</div>
    <div class="modal-body">${n.desc}<br><br>${n.detail}</div>
    <div style="margin-bottom:6px">📅 Pubblicata: <strong>${n.date}</strong></div>
    <div style="margin-bottom:10px">📰 Fonte: <a href="${n.sourceUrl}" target="_blank" class="modal-source-link">${n.source} ↗</a></div>
    <div style="margin-bottom:6px;font-size:0.82rem;color:var(--muted)">📲 Trending su:</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">${n.socials.map(s => `<span style="font-size:0.78rem;background:var(--card2);border:1px solid var(--accent);border-radius:10px;padding:3px 10px;color:var(--text)">${s}</span>`).join('')}</div>
    <div class="modal-score-row">
      <div class="score-badge ${cls}" style="min-width:60px;height:60px;font-size:1.8rem;">${n.score}</div>
      <div>
        <div class="modal-score-label">Punteggio di rilevanza</div>
        <div style="color:${scoreColors[cls]};font-weight:800;font-size:1.1rem">${cls==='green'?'Alta rilevanza':cls==='orange'?'Media rilevanza':'Bassa rilevanza'}</div>
      </div>
    </div>
    <div style="margin-top:12px">${n.buzz}</div>`;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}
function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function refreshAI() {
  const btn = document.querySelector('.update-btn');
  btn.textContent = '⏳ Analisi in corso...';
  btn.disabled = true;
  setTimeout(() => {
    btn.textContent = '✨ Aggiorna selezione AI';
    btn.disabled = false;
    renderAI();
    // Small shuffle effect
    const recs = document.querySelectorAll('.ai-rec');
    recs.forEach(r => { r.style.opacity = '0'; setTimeout(() => r.style.opacity = '1', 300); });
  }, 1800);
}
