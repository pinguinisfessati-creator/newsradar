name: NewsRadar Daily Update

on:
  schedule:
    # Ogni giorno alle 07:00 UTC = 08:00 CET
    - cron: "0 7 * * *"
  workflow_dispatch:  # permette avvio manuale da GitHub

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run NewsRadar updater
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python update_news.py

      - name: Commit & push updated HTML
        run: |
          git config user.name  "NewsRadar Bot"
          git config user.email "newsradar-bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🗞️ Auto-update $(date +'%d/%m/%Y %H:%M')"
          git push
