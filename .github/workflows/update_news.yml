name: NewsRadar Daily Update

on:
  schedule:
    # Every day at 07:00 UTC = 08:00 CET
    - cron: "0 7 * * *"
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated HTML

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run NewsRadar updater
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: python update_news.py

      - name: Commit & push updated HTML
        run: |
          git config user.name  "NewsRadar Bot"
          git config user.email "newsradar-bot@users.noreply.github.com"
          git add newsradar.html
          git diff --staged --quiet || git commit -m "🗞️ Auto-update notizie $(date +'%d/%m/%Y %H:%M')"
          git push
