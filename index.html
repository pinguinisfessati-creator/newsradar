    cursor: pointer;
    position: relative;
    overflow: hidden;

  .news-card.orange::before { background: var(--orange); }
  .news-card.red::before { background: var(--red); }

function getScoreClass(score) {
  if (score >= 7) return 'green';
  if (score >= 5) return 'orange';
  return 'red';
}

function renderNews(items) {
  const grid = document.getElementById('newsGrid');
  const existing = grid.querySelectorAll('.news-card');
  existing.forEach(e => e.remove());

  document.getElementById('newsCount').textContent = items.length + ' notizie';

  items.forEach(n => {
    const cls = getScoreClass(n.score);
    const card = document.createElement('div');
    card.className = `news-card ${cls}`;
    card.dataset.cat = n.cat;
    card.dataset.id = n.id;
    card.innerHTML = `
      <div class="score-badge ${cls}">${n.score}</div>
      <div class="news-body">
        <div class="news-meta">
          <span class="tag ${n.cat}">${n.cat.charAt(0).toUpperCase()+n.cat.slice(1)}</span>
          <span class="source-chip">📰 ${n.source}</span>
          ${n.trending ? '<span class="trending">🔥 TRENDING</span>' : ''}
        </div>
        <div class="news-title">${n.title}</div>
        <div class="news-desc">${n.desc}</div>
        <div class="news-footer">
          <span class="social-buzz">${n.buzz}</span>
          <span style="font-size:0.75rem;color:var(--muted);margin-left:auto;">📅 ${n.date}</span>
        </div>
        <div style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap;">
          ${n.socials.map(s => `<span style="font-size:0.68rem;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:2px 8px;color:var(--muted)">${s}</span>`).join('')}
        </div>
      </div>`;
    card.addEventListener('click', () => openModal(n));
    grid.appendChild(card);
  });
}

function renderAI() {
  const container = document.getElementById('aiRecs');
  container.innerHTML = '';
  aiRecommendations.forEach(rec => {
    const div = document.createElement('div');
    div.className = 'ai-rec';
    div.innerHTML = `
      <div class="ai-rec-num">📺 CONSIGLIO #${rec.num}</div>
      <div class="ai-rec-title">${rec.title}</div>
      <div class="ai-rec-reason">${rec.reason}</div>`;
    div.addEventListener('click', () => {
      const n = news.find(x => x.id === rec.newsId);
      if (n) openModal(n);
    });
    container.appendChild(div);
  });
}

function renderStats() {
  const cats = {};
  news.forEach(n => { cats[n.cat] = (cats[n.cat] || 0) + 1; });
  const max = Math.max(...Object.values(cats));
  const panel = document.getElementById('statsPanel');
  panel.innerHTML = '';
  const icons = {politica:'🏛️',economia:'💶',esteri:'🌍',cronaca:'🚨',tecnologia:'💻',societa:'👥',ambiente:'🌿',sport:'⚽',campania:'🌋'};
  Object.entries(cats).sort((a,b)=>b[1]-a[1]).forEach(([cat, count]) => {
    const pct = Math.round((count/max)*100);
    panel.innerHTML += `<div class="stat-row">
      <div class="stat-label">${icons[cat]||''} ${cat.charAt(0).toUpperCase()+cat.slice(1)}</div>
      <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%"></div></div>
      <div class="stat-count">${count}</div>
    </div>`;
  });
}

function filterNews(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = cat === 'all' ? news : news.filter(n => n.cat === cat);
  renderNews(filtered);
}

function searchNews(query) {
  const q = query.toLowerCase().trim();
  const filtered = q === '' ? news : news.filter(n =>
    n.title.toLowerCase().includes(q) ||
    n.desc.toLowerCase().includes(q) ||
    n.cat.includes(q) ||
    n.source.toLowerCase().includes(q)
  );
  renderNews(filtered);
}

function openModal(n) {
  const cls = getScoreClass(n.score);
  const scoreColors = {green: '#22c55e', orange: '#f59e0b', red: '#ef4444'};
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-tag"><span class="tag ${n.cat}">${n.cat.charAt(0).toUpperCase()+n.cat.slice(1)}</span></div>
    <div class="modal-title">${n.title}</div>
    <div class="modal-body">${n.desc}<br><br>${n.detail}</div>
    <div style="margin-bottom:6px">📅 Pubblicata: <strong>${n.date}</strong></div>
    <div style="margin-bottom:10px">📰 Fonte: <a href="${n.sourceUrl}" target="_blank" class="modal-source-link">${n.source} ↗</a></div>
    <div style="margin-bottom:6px;font-size:0.82rem;color:var(--muted)">📲 Trending su:</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">${n.socials.map(s => `<span style="font-size:0.78rem;background:var(--card2);border:1px solid var(--accent);border-radius:10px;padding:3px 10px;color:var(--text)">${s}</span>`).join('')}</div>
    <div class="modal-score-row">
      <div class="score-badge ${cls}" style="min-width:60px;height:60px;font-size:1.8rem;">${n.score}</div>
      <div>
        <div class="modal-score-label">Punteggio di rilevanza</div>
        <div style="color:${scoreColors[cls]};font-weight:800;font-size:1.1rem">${cls==='green'?'Alta rilevanza':cls==='orange'?'Media rilevanza':'Bassa rilevanza'}</div>
      </div>
    </div>
    <div style="margin-top:12px">${n.buzz}</div>`;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}
function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function refreshAI() {
  const btn = document.querySelector('.update-btn');
  btn.textContent = '⏳ Analisi in corso...';
  btn.disabled = true;
  setTimeout(() => {
    btn.textContent = '✨ Aggiorna selezione AI';
    btn.disabled = false;
    renderAI();
    // Small shuffle effect
    const recs = document.querySelectorAll('.ai-rec');
    recs.forEach(r => { r.style.opacity = '0'; setTimeout(() => r.style.opacity = '1', 300); });
  }, 1800);
}

renderNews(news);
renderAI();
renderStats();
</script>
